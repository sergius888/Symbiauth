name: cargo-audit
on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'  # daily

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit --deny warnings
